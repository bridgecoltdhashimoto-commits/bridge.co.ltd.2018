  <style>
    :root {
      --ink: #17231f;
      --muted: #5d6b66;
      --line: #d9e2dc;
      --line-strong: #b9cabe;
      --surface: #ffffff;
      --surface-soft: #f6f9f7;
      --surface-warm: #fbfaf5;
      --green: #103f35;
      --green-deep: #08261f;
      --green-soft: #e7f0eb;
      --gold: #c59a3d;
      --gold-deep: #946b21;
      --gold-soft: #f5ecd6;
      --danger-soft: #fff7ed;
      --shadow: 0 20px 55px rgba(8, 38, 31, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--surface);
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.75;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .page {
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(246, 249, 247, 0.86) 0, rgba(255, 255, 255, 0) 420px),
        var(--surface);
    }

    .section-inner,
    .header-inner {
      width: min(100% - 32px, 1120px);
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(217, 226, 220, 0.92);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 66px;
      gap: 14px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--green-deep);
      font-weight: 800;
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      flex: 0 0 auto;
      width: auto;
      height: 42px;
      max-width: 160px;
      border-radius: 0;
      object-fit: contain;
    }

    .brand-text {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      color: var(--green-deep);
      font-size: 0.96rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    .header-note {
      max-width: 156px;
      color: var(--green);
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.38;
      text-align: right;
    }

    .hero {
      padding: 30px 0 42px;
      color: var(--surface);
      background:
        linear-gradient(135deg, var(--green-deep) 0%, var(--green) 58%, #174d41 100%);
    }

    .hero-grid {
      display: grid;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--gold-soft);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 26px;
      height: 2px;
      background: var(--gold);
    }

    h1 {
      margin-bottom: 16px;
      color: var(--surface);
      font-size: 2rem;
      line-height: 1.22;
      font-weight: 900;
    }

    .lead {
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.98rem;
    }

    .hero-actions {
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
    }

    .price-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 5px 10px;
    }

    .price-label {
      width: 100%;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .price {
      color: var(--surface);
      font-size: 2.26rem;
      line-height: 1;
      font-weight: 900;
    }

    .tax-note {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.76rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      background: var(--gold);
      color: var(--green-deep);
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.35;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      border-color: #dcb765;
      background: #dcb765;
      transform: translateY(-1px);
    }

    .button-dark {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--green-deep);
    }

    .support-note {
      margin: 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.78rem;
    }

    .hero-points {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .hero-points li {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.9rem;
    }

    .check-dot {
      position: relative;
      width: 22px;
      height: 22px;
      margin-top: 3px;
      border: 1px solid rgba(197, 154, 61, 0.9);
      border-radius: 50%;
      background: rgba(197, 154, 61, 0.16);
    }

    .check-dot::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 4px;
      width: 5px;
      height: 9px;
      border: solid var(--gold);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .preview-panel {
      overflow: hidden;
      border: 1px solid rgba(245, 236, 214, 0.36);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-warm);
    }

    .preview-title {
      min-width: 0;
      color: var(--green-deep);
      font-size: 0.84rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .preview-badge {
      flex: 0 0 auto;
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--gold-soft);
      color: var(--gold-deep);
      font-size: 0.68rem;
      font-weight: 900;
      line-height: 1.25;
      white-space: nowrap;
    }

    .sheet-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .sheet-tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .sheet-tab.active {
      border-color: var(--green);
      background: var(--green);
      color: var(--surface);
    }

    .sheet-scroll {
      overflow-x: auto;
    }

    .sheet-table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 0.76rem;
    }

    .sheet-table th,
    .sheet-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    .sheet-table th {
      background: var(--green-soft);
      color: var(--green-deep);
      font-weight: 900;
    }

    .sheet-table td {
      color: var(--muted);
    }

    .status-pill {
      display: inline-flex;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--danger-soft);
      color: #9a4b15;
      font-weight: 800;
      white-space: nowrap;
    }

    .trust-strip {
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .trust-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .trust-list li {
      border-left: 3px solid var(--gold);
      padding: 10px 12px;
      background: var(--surface-warm);
      color: var(--green-deep);
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.45;
    }

    section {
      padding: 48px 0;
    }

    .section-muted {
      background: var(--surface-soft);
    }

    .section-dark {
      background: var(--green-deep);
      color: var(--surface);
    }

    .section-heading {
      margin-bottom: 12px;
      color: var(--green-deep);
      font-size: 1.55rem;
      line-height: 1.32;
      font-weight: 900;
    }

    .section-dark .section-heading {
      color: var(--surface);
    }

    .section-lead {
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .section-dark .section-lead,
    .section-dark .support-note,
    .section-dark .tax-note,
    .section-dark .price-label {
      color: rgba(255, 255, 255, 0.76);
    }

    .section-dark .price {
      color: var(--surface);
    }

    .feature-grid,
    .sheet-grid,
    .faq-grid {
      display: grid;
      gap: 12px;
    }

    .feature-card,
    .sheet-card,
    .faq-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 18px;
    }

    .feature-card h3,
    .sheet-card h3,
    .faq-card h3 {
      margin-bottom: 8px;
      color: var(--green);
      font-size: 1rem;
      line-height: 1.42;
      font-weight: 900;
    }

    .feature-card p,
    .sheet-card p,
    .faq-card p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .sheet-card {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
    }

    .sheet-no {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--green);
      color: var(--surface);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1;
    }

    .flow-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: flow;
    }

    .flow-list li {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 16px;
      counter-increment: flow;
    }

    .flow-list li::before {
      content: counter(flow, decimal-leading-zero);
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--gold-soft);
      color: var(--gold-deep);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .flow-list strong {
      display: block;
      margin-bottom: 4px;
      color: var(--green-deep);
      line-height: 1.45;
    }

    .flow-list span {
      color: var(--muted);
